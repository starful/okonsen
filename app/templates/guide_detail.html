<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - OKOnsen Guide</title>
    <meta name="description" content="{{ summary }}">
    <link rel="icon" href="/static/images/favicons.ico">
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- 가이드 상세페이지 전용 CSS (메인 헤더 사이즈와 완벽 동기화) -->
    <style>
        /* 1. 헤더 사이즈 및 로고 크기를 메인 페이지와 100% 일치 */
        header {
            padding: 10px 0 !important; /* 메인 페이지 패딩과 동일하게 고정 */
            background: rgba(255, 255, 255, 0.98) !important;
        }

        header .logo-img { 
            height: 45px !important; /* 메인 페이지 로고 높이 45px와 일치 */
            width: auto !important;
            margin: 0 !important;
        }

        .header-container {
            align-items: center !important;
            display: grid !important;
            grid-template-columns: 1fr auto 1fr !important;
        }
        
        /* 2. 상세페이지에서는 메인용 필터바만 강제 숨김 */
        .top-filter-bar { 
            display: none !important; 
        }

        /* 3. 잡지 스타일 본문 컨테이너 */
        .guide-detail-wrapper {
            max-width: 800px;
            margin: 40px auto 80px;
            background: #fff;
            padding: 60px 80px;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.06);
            line-height: 1.8;
        }

        /* 4. 제목 및 이미지 */
        .detail-title {
            font-size: 2.6rem;
            font-weight: 900;
            line-height: 1.3;
            color: #111;
            margin-bottom: 30px;
            letter-spacing: -1px;
            text-align: left;
        }

        .detail-main-img {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 40px;
            display: block;
        }

        /* 5. 마크다운 본문 스타일링 */
        .guide-body-content {
            font-size: 1.15rem;
            color: #333;
        }

        .guide-body-content h2 {
            font-size: 1.9rem;
            margin-top: 50px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 4px solid #e74c3c; /* 포인트 레드 */
            display: inline-block;
            font-weight: 800;
            color: #000;
        }

        .guide-body-content h3 {
            font-size: 1.5rem;
            margin-top: 35px;
            color: #222;
            font-weight: 700;
        }

        .guide-body-content p {
            margin-bottom: 1.8rem;
        }

        /* 테이블 디자인 */
        .guide-body-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 30px 0;
            border: 1px solid #eee;
        }
        .guide-body-content th, .guide-body-content td {
            padding: 15px;
            border: 1px solid #f0f0f0;
            text-align: left;
        }
        .guide-body-content th { background: #f9f9f9; font-weight: 700; }

        /* 6. 하단 백 버튼 */
        .back-section {
            text-align: center;
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid #eee;
        }

        .btn-back-to-list {
            display: inline-block;
            padding: 14px 35px;
            border: 2px solid #eee;
            border-radius: 50px;
            color: #666;
            font-weight: 800;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-back-to-list:hover {
            background: #f8f9fa;
            border-color: #ddd;
            color: #111;
            transform: translateY(-2px);
        }

        /* 7. 모바일 대응 */
        @media (max-width: 768px) {
            header { padding: 10px 0 !important; }
            header .logo-img { height: 40px !important; } /* 모바일용 헤더 사이즈 조정 */
            .guide-detail-wrapper {
                padding: 30px 20px;
                margin: 20px 15px;
                border-radius: 15px;
            }
            .detail-title {
                font-size: 1.8rem;
            }
            .detail-main-img {
                max-height: 250px;
            }
            .guide-body-content {
                font-size: 1.05rem;
            }
        }
    </style>

    <!-- Article JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": "{{ title }}",
      "image": "{{ image_url }}",
      "author": {"@type": "Organization", "name": "OKOnsen"}
    }
    </script>
</head>
<body>
    <!-- 헤더 임포트 (높이값은 위 스타일에서 강제 고정) -->
    {% include 'header.html' %}

    <main class="container">
        <article class="guide-detail-wrapper">
            <!-- 대표 이미지 -->
            <img src="{{ image_url }}" class="detail-main-img" alt="{{ title }}">

            <!-- 제목 -->
            <h1 class="detail-title">{{ title }}</h1>

            <!-- 본문 내용 -->
            <div class="guide-body-content">
                {{ content | safe }}
            </div>

            <!-- 하단 백 버튼 -->
            <div class="back-section">
                <a href="/guides?lang={{ lang }}" class="btn-back-to-list">
                    {{ '← Back to Guides List' if lang == 'en' else '← 가이드 목록으로 돌아가기' }}
                </a>
            </div>
        </article>
    </main>

    <!-- 풋터 임포트 -->
    {% include 'footer.html' %}
</body>
</html>
