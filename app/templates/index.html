<html lang="en">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="canonical" href="https://okonsen.net" />

    <title>OKOnsen - Discover Japan's Best Hot Springs & Ryokans</title>
    <meta name="description" content="Find the perfect Japanese Onsen. Filter by private baths, tattoo-friendly spots, and luxury ryokans.">
    <link rel="icon" href="/static/images/favicons.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">

<body>

    <header>
        <div class="container header-container">
            <div class="logo-wrapper">
                <a href="/">
                    <img src="/static/images/logo.png" alt="OKOnsen" class="logo-img">
                </a>
            </div>

            <div class="header-right">
                <div class="lang-selector">
                    <button class="lang-btn active" data-lang="en">English</button>
                    <button class="lang-btn" data-lang="ko">한국어</button>
                </div>
            </div>

            <div class="theme-filter-buttons">
                <button class="theme-button active" data-theme="all">All <span class="count-badge" id="count-all">0</span></button>
                <button class="theme-button" data-theme="private">🛁 Private <span class="count-badge" id="count-private">0</span></button>
                <button class="theme-button" data-theme="tattoo">⭕ Tattoo OK <span class="count-badge" id="count-tattoo">0</span></button>
                <button class="theme-button" data-theme="view">🗻 View <span class="count-badge" id="count-view">0</span></button>
                <button class="theme-button" data-theme="luxury">✨ Luxury <span class="count-badge" id="count-luxury">0</span></button>
                <button class="theme-button" data-theme="local">🏮 Local <span class="count-badge" id="count-local">0</span></button>
            </div>
        </div>
    </header>
    
    <main>
        <section class="map-section">
            <div id="map"></div>
        </section>

        <div class="content-wrapper">
            <article class="intro-box">
                <h2>♨️ Find Your Perfect Onsen</h2>
                <p>Filter by Private Baths, Tattoo-friendly spots, or Luxury stays.</p>
            </article>

            <section id="list-section">
                <h2 class="list-title">🎏 Latest Onsen Guides</h2>
                <div id="onsen-list" class="onsen-grid"></div>
                <div id="scroll-sentinel" style="height: 20px;"></div>
            </section>
        </div>
    </main>
