    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="canonical" href="https://okonsen.net" />

    <title>OKOnsen - Discover Japan's Best Hot Springs & Ryokans</title>
    <meta name="description" content="Find the perfect Japanese Onsen. Filter by private baths, tattoo-friendly spots, Mount Fuji views, and luxury ryokans on our interactive map.">
    <meta name="keywords" content="Japan Onsen, Ryokan Map, Hot Spring, Tattoo Friendly Onsen, Private Bath Onsen, Japan Travel Guide">
    <meta name="author" content="OKOnsen Project">
    <meta name="theme-color" content="#3498db">
    
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="OKOnsen">
    <meta property="og:title" content="OKOnsen - Japan Hot Spring Guide">
    <meta property="og:description" content="Discover your perfect Onsen and Ryokan in Japan.">
    <meta property="og:url" content="https://okonsen.net">
    <meta property="og:image" content="https://okonsen.net/static/images/og_image.png">

    <link rel="icon" href="/static/images/favicons.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">

<body>

    <!-- 구글 번역기 위젯 삭제됨 -->

    <header>
        <div class="container">
            <h1>
                <a href="/">
                    <img src="/static/images/logo.png" alt="OKOnsen" class="logo-img" style="height: 100px; width: auto; display: block; margin: 0 auto;">
                </a>
            </h1>

            <div class="status-bar">
                <div class="status-badge">
                    ♨️ <span id="total-onsens">0</span> Onsens Listed
                </div>
                <div class="status-badge">
                    📅 Updated: <span id="last-updated-date">-</span>
                </div>
                <div class="status-badge highlight">
                    🔄 Updating Weekly
                </div>
            </div>

            <div class="lang-selector">
                <button class="lang-btn active" data-lang="en">English</button>
                <button class="lang-btn" data-lang="ko">한국어</button>
            </div>

            <div class="theme-filter-buttons">
                <button class="theme-button active" data-theme="all">All <span class="count-badge" id="count-all">0</span></button>
                <button class="theme-button" data-theme="private">🛁 Private Bath <span class="count-badge" id="count-private">0</span></button>
                <button class="theme-button" data-theme="tattoo">⭕ Tattoo OK <span class="count-badge" id="count-tattoo">0</span></button>
                <button class="theme-button" data-theme="view">🗻 Great View <span class="count-badge" id="count-view">0</span></button>
                <button class="theme-button" data-theme="luxury">✨ Luxury <span class="count-badge" id="count-luxury">0</span></button>
                <button class="theme-button" data-theme="local">🏮 Local <span class="count-badge" id="count-local">0</span></button>
            </div>
            
        </div>
    </header>
    
    <main>
        <section class="map-section">
            <div id="map"></div>
        </section>

        <div class="content-wrapper">
            <article class="intro-box">
                <h2>♨️ Discover Your Perfect Onsen in Japan</h2>
                <p>
                    OKOnsen helps you find the best <strong>Hot Springs & Ryokans</strong> across Japan.<br>
                    Filter by Private Baths, Tattoo policies, or Luxury stays to find your destination.
                </p>
            </article>

            <section id="list-section">
                <h2 class="list-title">🎏 Latest Onsen Guides</h2>
                <div id="onsen-list" class="onsen-grid"></div>
                <div id="scroll-sentinel" style="height: 20px; width: 100%;"></div>
            </section>
        </div>
    </main>
