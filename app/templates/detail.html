<!DOCTYPE html>
<html lang="{{ post.lang if post.lang else 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - OKOnsen</title>
    <meta name="description" content="{{ post.summary }}">
    <link rel="canonical" href="https://okonsen.net/onsen/{{ post.id }}" />

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NZE8KSDC7X"></script>
    <script>
      window.dataLayer = window.dataLayer ||[];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NZE8KSDC7X');
    </script>

    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .detail-container { max-width: 800px; margin: 0 auto; padding: 20px; background: #fff; }
        .detail-header { text-align: center; margin-bottom: 40px; }
        .detail-title { font-size: 2rem; margin-bottom: 10px; color: #333; }
        .detail-meta { color: #666; font-size: 0.9rem; }
        .detail-img { width: 100%; height: auto; border-radius: 10px; margin-bottom: 30px; }
        .detail-content { font-size: 1.1rem; line-height: 1.8; color: #444; }
        .detail-content h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 40px; color: #3498db; }
        .detail-content img { max-width: 100%; height: auto; display: block; margin: 20px auto; border-radius: 5px; }
        .back-btn { display: inline-block; margin-top: 40px; padding: 10px 20px; background: #333; color: white; text-decoration: none; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header style="padding: 20px;">
            <a href="/">
                <img src="/static/images/logo.png" alt="OKOnsen" style="height: 60px; display: block; margin: 0 auto;">
            </a>
        </header>

        <article class="detail-container">
            <div class="detail-header">
                <h1 class="detail-title">{{ post.title }}</h1>
                <div class="detail-meta">
                    📍 {{ post.address }} | 🏷️ {{ post.categories|join(', ') }}
                </div>
            </div>

            <img src="{{ post.thumbnail }}" alt="{{ post.title }}" class="detail-img">

            <div class="detail-content">
                {{ content | safe }}
            </div>

            {% if post.agoda %}
            <div style="text-align: center; margin: 20px 0;">
                <a href="{{ post.agoda }}" target="_blank" rel="nofollow" 
                style="display: inline-block; background-color: #3498db; color: white; padding: 15px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 30px; text-decoration: none; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); transition: transform 0.2s;">
                ✨ Check Availability & Prices on Agoda
                </a>
            </div>
            {% endif %}

            <div style="text-align: center;">
                <a href="/" class="back-btn">🗺️ Back to Map</a>
            </div>
        </article>
        
        {% include 'footer.html' %}
    </div>
</body>
</html>
